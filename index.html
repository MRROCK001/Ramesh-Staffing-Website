<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Ramesh Staffing Services</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Ramesh Staffing Services</h1>

<h2>Job Application Form</h2>

<form id="contact-form">

<input
type="text"
name="name"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="tel"
name="phone"
placeholder="Mobile Number"
required>

<textarea
name="message"
placeholder="Message"
required></textarea>

<button type="submit">

Submit Application

</button>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script src="script.js"></script>

</body>
</html>
